/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java-library'
    id 'maven-publish'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    api 'org.springframework.boot:spring-boot-starter-jersey:1.2.7.RELEASE'
    api 'org.springframework.boot:spring-boot-starter-jetty:1.2.7.RELEASE'
    api 'org.msgpack:jackson-dataformat-msgpack:0.7.1'
    testImplementation 'org.springframework.boot:spring-boot-starter-test:1.2.7.RELEASE'
    testImplementation 'com.jayway.restassured:rest-assured:2.4.1'
    compileOnly 'org.projectlombok:lombok:1.16.4'
}

group = 'com.yit'
version = '1.0-SNAPSHOT'
description = 'Modern Java RPC stack using Jetty+Jersey+Jackson+MessagePack (from https://github.com/making/msgpack-rpc-jersey-blank)'
java.sourceCompatibility = JavaVersion.VERSION_1_8

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}
task run(type: JavaExec) {
main = 'com.yit.demo.App'
classpath = sourceSets.main.runtimeClasspath }
